name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared
          npm run build --workspace=packages/db

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Type check (api)
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Type check (tma)
        run: npx tsc --noEmit
        working-directory: apps/tma

      - name: Run tests
        run: npm run test --workspace=apps/api -- --coverage --no-color
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-min-32-chars-padding' }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: apps/api/coverage/
          retention-days: 7

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: apps/tma

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: apps/tma

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/tma/playwright-report/
          retention-days: 7

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test, e2e]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: false
          tags: klyovo-api:${{ github.sha }}

      - name: Build TMA image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/tma/Dockerfile
          target: production
          push: false
          tags: klyovo-tma:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.klyovo.ru
            VITE_BOT_USERNAME=KlyovoBot
